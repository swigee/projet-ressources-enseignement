<div class="h-full flex flex-col p-6 space-y-6 overflow-y-auto bg-gray-50/30">
    
    <!-- Header & Search -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Syllabus des Ressources</h1>
            <p class="text-sm text-gray-500 mt-1">Consultez et éditez les programmes nationaux et personnels.</p>
        </div>
        <div class="relative w-full md:w-72">
            <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" [(ngModel)]="searchQuery" placeholder="Rechercher une ressource..."
                   class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-gray-50 focus:bg-white transition-colors">
        </div>
    </div>

    <!-- Filters -->
    <div class="flex items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
        <span class="text-sm font-semibold text-gray-700 w-24">Filtrer par :</span>
        
        <div class="flex items-center gap-2">
            <label class="text-sm text-gray-500">Semestre</label>
            <select [(ngModel)]="selectedSemester" (change)="onSemesterChange()"
                    class="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2">
                <option *ngFor="let s of semesters" [value]="s">{{ s }}</option>
            </select>
        </div>

        <div class="w-px h-6 bg-gray-200 mx-2"></div>

        <div class="flex items-center gap-2">
            <label class="text-sm text-gray-500">Parcours</label>
            <select [(ngModel)]="selectedParcours" [disabled]="selectedSemester === 'S1' || selectedSemester === 'S2'"
                    class="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <option *ngFor="let p of parcoursOptions" [value]="p">{{ p }}</option>
            </select>
            <span *ngIf="selectedSemester === 'S1' || selectedSemester === 'S2'" class="text-xs text-blue-500 italic ml-2">
                (Tronc commun uniquement)
            </span>
        </div>
    </div>

    <!-- Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div *ngFor="let res of filteredResources" 
             (click)="goToDetail(res.id)"
             class="bg-white rounded-2xl shadow-sm hover:shadow-md border border-gray-100 p-6 cursor-pointer transition-all hover:-translate-y-1 group">
            
            <div class="flex justify-between items-start mb-4">
                <span class="inline-flex items-center justify-center px-2.5 py-1 text-xs font-bold leading-none text-blue-700 bg-blue-100 rounded-full">
                    {{ res.code }}
                </span>
                <div class="flex gap-1">
                    <span class="text-xs font-medium bg-gray-100 text-gray-600 px-2 py-1 rounded">{{ res.semester }}</span>
                    <span *ngIf="res.parcours !== 'Tronc Commun'" class="text-xs font-medium bg-purple-100 text-purple-700 px-2 py-1 rounded">{{ res.parcours }}</span>
                </div>
            </div>

            <h3 class="font-bold text-gray-900 mb-2 group-hover:text-blue-600 transition-colors line-clamp-2">
                {{ res.title }}
            </h3>
            <p class="text-sm text-gray-500 line-clamp-2">
                {{ res.description }}
            </p>
        </div>

        <div *ngIf="filteredResources.length === 0" class="col-span-full py-12 text-center text-gray-500">
            <i class="fa-regular fa-folder-open text-4xl text-gray-300 mb-3 block"></i>
            Aucune ressource ne correspond à vos critères.
        </div>
    </div>

</div>
