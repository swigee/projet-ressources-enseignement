stages:
  - build
  - test
  - sonarqube-check
  - deploy

# Job de build pour le backend Java
build-backend:
  stage: build
  script:
    - echo "Compiling backend Java code..."
    - mvn -f backend/ressources_enseignements/pom.xml clean compile
  only:
    - merge_requests
    - main

# Job de build pour le frontend (si besoin)
build-frontend:
  stage: build
  script:
    - echo "Building frontend..."
    - cd frontend/ressources_enseignements && npm install && npm run build || echo "No frontend build configured"
  only:
    - merge_requests
    - main

# Job test factice (pas de tests pour l'instant)
unit-test-job:
  stage: test
  script:
    - echo "No unit tests available. Skipping..."
  allow_failure: true
  only:
    - merge_requests
    - main

# Job lint factice (optionnel)
lint-test-job:
  stage: test
  script:
    - echo "No lint configured. Skipping..."
  allow_failure: true
  only:
    - merge_requests
    - main

# Analyse SonarQube
sonarqube-check:
  stage: sonarqube-check
  image:
    name: sonarsource/sonar-scanner-cli:5.0
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
    SONAR_TOKEN: "${SONAR_TOKEN}"   # Token SonarQube stocké dans GitLab CI/CD
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner -Dsonar.login=$SONAR_TOKEN
  allow_failure: true
  only:
    - merge_requests
    - main

# Déploiement factice
deploy-job:
  stage: deploy
  environment: production
  script:
    - echo "Deploying application..."
    - echo "Application deployed successfully."
  only:
    - merge_requests
    - main
