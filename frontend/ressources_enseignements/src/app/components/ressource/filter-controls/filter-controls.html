<div class="bg-white rounded-lg shadow p-6 mb-6 border-b border-gray-200">
  <h2 class="text-lg font-semibold mb-4">Filtre</h2>
  <div class="grid grid-cols-4 gap-4">

    <!-- Formation -->
    <div>
      <label class="block text-sm font-medium text-red-500 mb-2">
        Formation
        <span class="tooltip-wrap"><span class="tooltip-icon">?</span><span class="tooltip-text">Sélectionnez la formation (ex : BUT Informatique) pour afficher les ressources associées.</span></span>
      </label>
      <select
        [ngModel]="selectedFormation"
        (ngModelChange)="formationChange.emit($event)"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      >
        <option value="">Toutes les formations</option>
        @for (f of formations; track f.id) {
          <option [value]="f.id">{{ f.name }}</option>
        }
      </select>
    </div>

    <!-- Année -->
    <div>
      <label class="block text-sm font-medium text-green-600 mb-2">
        Année d'étude
        <span class="tooltip-wrap"><span class="tooltip-icon">?</span><span class="tooltip-text">Année du parcours (BUT 1, 2 ou 3). Chaque année a ses propres ressources et semestres.</span></span>
      </label>
      <select
        [ngModel]="selectedYear"
        (ngModelChange)="yearChange.emit($event)"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      >
        <option value="">Toutes les années</option>
        @for (yearKey of getYearKeys(); track yearKey) {
          <option [value]="yearKey">{{ classData[yearKey].name }}</option>
        }
      </select>
    </div>

    <!-- Semestre -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Semestre
        <span class="tooltip-wrap"><span class="tooltip-icon">?</span><span class="tooltip-text">Semestre 1 (septembre–janvier) ou Semestre 2 (février–juin).</span></span>
      </label>
      <select
        [ngModel]="selectedSemester"
        (ngModelChange)="semesterChange.emit($event)"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      >
        <option value="">Tous les semestres</option>
        <option value="1">Semestre 1</option>
        <option value="2">Semestre 2</option>
      </select>
    </div>

    <!-- Groupe -->
    <div>
      <label class="block text-sm font-medium text-blue-600 mb-2">
        Groupe
        <span class="tooltip-wrap"><span class="tooltip-icon">?</span><span class="tooltip-text">Groupe TD/TP (ex : G1, G2). Les ressources affichées correspondent aux heures prévues pour ce groupe.</span></span>
      </label>
      <select
        [ngModel]="selectedClass"
        (ngModelChange)="classChange.emit($event)"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      >
        <option value="">Tous les groupes</option>
        @for (classOption of availableClasses; track classOption) {
          <option [value]="classOption">{{ classOption }}</option>
        }
      </select>
    </div>

  </div>

  @if (allClassesMode) {
    <div class="mt-4 p-3 bg-blue-50 border border-blue-200 rounded-lg">
      <p class="text-sm text-blue-700">
        <span class="font-medium">Vue toutes classes</span> — les ressources de tous les groupes sont affichées. La colonne "Groupes" indique les classes concernées.
      </p>
    </div>
  }
</div>
