stages:
  - test
  - build
  - sonar
  - docker

# ─── Variables globales ────────────────────────────────────────────────────────
variables:
  MAVEN_OPTS: >-
    -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dmaven.color=false
  DOCKER_TLS_CERTDIR: "/certs"
  # À définir dans Settings > CI/CD > Variables (masked) :
  #   SONAR_HOST_URL  → ex: http://sonarqube:9000
  #   SONAR_TOKEN     → token généré dans SonarQube

# ─── Anchors cache ────────────────────────────────────────────────────────────
.cache-maven: &cache-maven
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository/

.cache-node: &cache-node
  cache:
    key: "node-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/ressources_enseignements/node_modules/

.rules-default: &rules-default
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"

# ─── STAGE : test ─────────────────────────────────────────────────────────────

test:backend:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  <<: *cache-maven
  <<: *rules-default
  services:
    - name: mysql:8.0
      alias: mysql-ci
      variables:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: ressources_enseignements_test
        MYSQL_USER: sae
        MYSQL_PASSWORD: sae
  variables:
    SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-ci:3306/ressources_enseignements_test?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false"
    SPRING_DATASOURCE_USERNAME: sae
    SPRING_DATASOURCE_PASSWORD: sae
    SPRING_PROFILES_ACTIVE: test
  script:
    - cd backend/ressources_enseignements
    - mvn verify --no-transfer-progress -B
  artifacts:
    when: always
    reports:
      junit: backend/ressources_enseignements/target/surefire-reports/TEST-*.xml
    paths:
      - backend/ressources_enseignements/target/site/jacoco/
      - backend/ressources_enseignements/target/surefire-reports/
    expire_in: 1 day

test:frontend:
  stage: test
  image: node:20-slim
  <<: *cache-node
  <<: *rules-default
  before_script:
    - apt-get update -qq && apt-get install -y -qq chromium
    - export CHROME_BIN=/usr/bin/chromium
  script:
    - cd frontend/ressources_enseignements
    - npm ci --prefer-offline
    - npx ng test --no-watch --no-progress --browsers=ChromeHeadlessCI --code-coverage
  artifacts:
    when: always
    paths:
      - frontend/ressources_enseignements/coverage/
    expire_in: 1 day

# ─── STAGE : build ────────────────────────────────────────────────────────────

build:backend:
  stage: build
  image: maven:3.9-eclipse-temurin-21
  <<: *cache-maven
  <<: *rules-default
  script:
    - cd backend/ressources_enseignements
    - mvn package -DskipTests --no-transfer-progress -B
  artifacts:
    paths:
      - backend/ressources_enseignements/target/*.jar
    expire_in: 1 hour

build:frontend:
  stage: build
  image: node:20-slim
  <<: *cache-node
  <<: *rules-default
  script:
    - cd frontend/ressources_enseignements
    - npm ci --prefer-offline
    - npx ng build --configuration production
  artifacts:
    paths:
      - frontend/ressources_enseignements/dist/
    expire_in: 1 hour

# ─── STAGE : sonar ────────────────────────────────────────────────────────────

sonar:analyze:
  stage: sonar
  image: maven:3.9-eclipse-temurin-21
  <<: *cache-maven
  needs:
    - test:backend
    - test:frontend
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"  # Nécessaire pour le blame et l'analyse des branches
  cache:
    key: "sonar-cache"
    paths:
      - .sonar/cache/
  script:
    - cd backend/ressources_enseignements
    - mvn sonar:sonar --no-transfer-progress -B
      -Dsonar.host.url="${SONAR_HOST_URL}"
      -Dsonar.token="${SONAR_TOKEN}"
      -Dsonar.qualitygate.wait=true
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"
  allow_failure: false

# ─── STAGE : docker ───────────────────────────────────────────────────────────

docker:build:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  needs:
    - build:backend
    - build:frontend
  script:
    - docker compose build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "master"
