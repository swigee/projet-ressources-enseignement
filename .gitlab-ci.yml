stages:
  - build
  - test
  - sonarqube-check
  - deploy

variables:
  # Configuration pour optimiser Maven
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

# --- BACKEND JOB ---
build-backend:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  cache:
    key: backend-deps
    paths:
      - .m2/repository
  script:
    - echo "Compiling backend Java code..."
    # Pensez à vérifier le doublon Lombok dans votre pom.xml !
    - mvn -f backend/ressources_enseignements/pom.xml clean compile
  only:
    - merge_requests
    - main

# --- FRONTEND JOB ---
build-frontend:
  stage: build
  image: node:20
  cache:
    key: frontend-deps
    paths:
      - frontend/ressources_enseignements/node_modules
  script:
    - echo "Building frontend..."
    - cd frontend/ressources_enseignements
    - npm install
    - npm run build
  only:
    - merge_requests
    - main

# --- TEST JOBS ---
unit-test-job:
  stage: test
  script:
    - echo "No unit tests available. Skipping..."
  allow_failure: true
  only:
    - merge_requests
    - main

lint-test-job:
  stage: test
  script:
    - echo "No lint configured. Skipping..."
  allow_failure: true
  only:
    - merge_requests
    - main

# --- SONARQUBE ---
sonarqube-check:
  stage: sonarqube-check
  image:
    name: sonarsource/sonar-scanner-cli:5.0
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner -Dsonar.login=$SONAR_TOKEN
  allow_failure: true
  only:
    - merge_requests
    - main

# --- DEPLOY ---
deploy-job:
  stage: deploy
  environment: production
  script:
    - echo "Deploying application..."
    - echo "Application deployed successfully."
  only:
    - merge_requests
    - main