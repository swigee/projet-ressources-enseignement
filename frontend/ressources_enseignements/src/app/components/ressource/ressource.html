<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-7xl mx-auto bg-white rounded-lg shadow-lg">

    <div class="border-b border-gray-200 p-6">
      <h1 class="text-2xl font-semibold text-gray-800">Tableau des ressources</h1>
    </div>

    <div class="flex border-b border-gray-300">
      <button
        (click)="setActiveTab('ressources')"
        [class]="activeTab() === 'ressources'
          ? 'px-6 py-3 font-medium bg-gray-500 text-white'
          : 'px-6 py-3 font-medium bg-white text-gray-700 hover:bg-gray-100'"
      >Resources</button>
      <button
        (click)="setActiveTab('maquette')"
        [class]="activeTab() === 'maquette'
          ? 'px-6 py-3 font-medium bg-gray-500 text-white'
          : 'px-6 py-3 font-medium bg-white text-gray-700 hover:bg-gray-100'"
      >Maquette</button>
      <button
        (click)="setActiveTab('validation')"
        [class]="activeTab() === 'validation'
          ? 'px-6 py-3 font-medium bg-gray-500 text-white'
          : 'px-6 py-3 font-medium bg-white text-gray-700 hover:bg-gray-100'"
      >Validation services</button>
    </div>

    <app-filter-controls
      [selectedYear]="selectedYear()"
      [selectedClass]="selectedClass()"
      [selectedSemester]="selectedSemester()"
      [classData]="classData"
      (yearChange)="onYearChange($event)"
      (classChange)="onClassChange($event)"
      (semesterChange)="onSemesterChange($event)"
    />

    @if (isLoading()) {
    <div class="flex justify-center items-center p-12">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
    </div>
    }

    @if (errorMessage()) {
    <div class="p-4 m-6 bg-red-50 border border-red-200 rounded-lg">
      <p class="text-sm text-red-800">{{ errorMessage() }}</p>
    </div>
    }

    @if (activeTab() === 'ressources' && !isLoading()) {
    <app-resources-tab
      [filteredRessources]="filteredRessources()"
      [calculatedTotals]="calculatedTotals()"
      [filteredConflicts]="filteredConflicts()"
      [availableTeachers]="availableTeachers()"
      [selectedTeacherIds]="selectedTeacherIds()"
      [searchQuery]="searchQuery()"
      (searchQueryChange)="searchQuery.set($event)"
      (teacherSelected)="toggleTeacherFilter($event)"
      (teacherFilterRemoved)="removeTeacherFilter($event)"
      (filtersCleared)="clearFilters()"
    />
    }

    @if (activeTab() === 'maquette' && !isLoading()) {
    <app-maquette-tab
      [scheduleData]="scheduleData()"
      [projectData]="projectData()"
      [weeks]="weeks()"
      [isEditing]="isEditing()"
      [successMessage]="successMessage()"
      [errorMessage]="errorMessage()"
      (editingEnabled)="enableEditing()"
      (editingValidated)="validateEditing()"
      (editingCancelled)="cancelEditing()"
      (scheduleHoursChanged)="onScheduleHoursChanged($event)"
      (projectHoursChanged)="onProjectHoursChanged($event)"
    />
    }

    @if (activeTab() === 'validation' && !isLoading()) {
    <app-validation-tab
      [selectedYear]="selectedYear()"
      (ticketRequested)="showModal.set(true)"
    />
    }

    <app-ticket-modal
      [isOpen]="showModal()"
      (closed)="showModal.set(false)"
    />

  </div>
</div>
