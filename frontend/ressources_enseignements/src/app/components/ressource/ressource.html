<div class="bg-white rounded-lg shadow-lg">

  <div class="border-b border-gray-200 p-6 flex justify-between items-center">
    <h1 class="text-3xl font-bold">Tableau des ressources</h1>
  </div>

  <div class="flex border-b border-gray-300">
    <button (click)="setActiveTab('ressources')" [class]="activeTab() === 'ressources'
        ? 'px-6 py-3 font-medium bg-gray-500 text-white'
        : 'px-6 py-3 font-medium bg-white text-gray-700 hover:bg-gray-100'">Resources</button>
    <button (click)="setActiveTab('maquette')" [class]="activeTab() === 'maquette'
        ? 'px-6 py-3 font-medium bg-gray-500 text-white'
        : 'px-6 py-3 font-medium bg-white text-gray-700 hover:bg-gray-100'">Maquette</button>
  </div>

  <app-filter-controls [selectedFormation]="selectedFormation()" [formations]="formations()" [selectedYear]="selectedYear()" [selectedClass]="selectedClass()"
    [availableClasses]="availableClasses()" [selectedSemester]="selectedSemester()" [classData]="classData" (formationChange)="onFormationChange($event)" (yearChange)="onYearChange($event)"
    (classChange)="onClassChange($event)" (semesterChange)="onSemesterChange($event)" />

  @if (isLoading()) {
  <div class="flex justify-center items-center p-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  </div>
  }

  @if (errorMessage()) {
  <div class="p-4 m-6 bg-red-50 border border-red-200 rounded-lg">
    <p class="text-sm text-red-800">{{ errorMessage() }}</p>
  </div>
  }

  @if (activeTab() === 'ressources' && !isLoading()) {
  <app-resources-tab [filteredRessources]="filteredRessources()" [calculatedTotals]="calculatedTotals()"
    [filteredConflicts]="filteredConflicts()" [availableTeachers]="availableTeachers()"
    [selectedTeacherIds]="selectedTeacherIds()" [searchQuery]="searchQuery()"
    (searchQueryChange)="searchQuery.set($event)" (teacherSelected)="toggleTeacherFilter($event)"
    (teacherFilterRemoved)="removeTeacherFilter($event)" (filtersCleared)="clearFilters()" />
  }

  @if (activeTab() === 'maquette' && !isLoading()) {
  <app-maquette-tab [scheduleData]="scheduleData()" [projectData]="projectData()" [weeks]="weeks()"
    [isEditing]="isEditing()" [successMessage]="successMessage()" [errorMessage]="errorMessage()"
    (editingEnabled)="enableEditing()" (editingValidated)="validateEditing()" (editingCancelled)="cancelEditing()"
    (scheduleHoursChanged)="onScheduleHoursChanged($event)" (projectHoursChanged)="onProjectHoursChanged($event)" />
  }


</div>
