services:
  mysql:
    image: mysql:8.0
    container_name: mysql-sae
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ressources_enseignements
      MYSQL_USER: sae
      MYSQL_PASSWORD: sae
#    volumes:
#      - db_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      retries: 10

  backend:
    build: ./backend/ressources_enseignements
    container_name: backend-sae
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    restart: always

  frontend:
    build: ./frontend/ressources_enseignements
    container_name: frontend-sae
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
