<div class="bg-white shadow-sm rounded-xl border border-gray-200 overflow-hidden w-full max-w-4xl mx-auto">
    <button class="bg-black w-7 h-7 rounded-sm cursor-pointer m-4" (click)="goBack()">
        <i class="fa-solid fa-arrow-left text-white text-sm pt-0.5"></i>
    </button>
    <div class="px-8 py-6 border-b border-gray-200">
        <h2 class="text-xl font-semibold text-gray-900">{{ form.value.id ? 'Modification d\'une formation' : 'Création d\'une formation' }}</h2>
    </div>
    <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="px-8 py-6 space-y-6">
            <div class="grid gap-4 lg:grid-cols-2">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Nom de la formation <span class="text-red-500">*</span>
                    </label>
                    <input type="text" formControlName="name"
                        class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2
                        focus:ring-blue-500 focus:border-transparent transition-all duration-200" placeholder="Nom de la formation">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Parcours <span class="text-red-500">*</span>
                    </label>
                    <input type="text" formControlName="parcours"
                        class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2
                        focus:ring-blue-500 focus:border-transparent transition-all duration-200" placeholder="Parcours (ex: Informatique, Réseau)">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Description de la formation
                </label>
                <textarea formControlName="description" rows="5" class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 
                    focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200 resize-none" 
                    placeholder="Décrivez les objectifs, le contenu et les compétences que les participants acquerront..."></textarea>
            </div>

            <div class="flex items-center justify-between gap-4">
                <h3 class="text-lg font-semibold text-gray-900">Semestres</h3>
                <button type="button" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition" (click)="addSemester()">
                    Ajouter un semestre
                </button>
            </div>

            <div class="space-y-5">
                @for (semesterGroup of semesterFormGroups; track semesterGroup) {
                <div [formGroup]="semesterGroup" class="border border-gray-200 rounded-2xl p-4 bg-gray-50">
                    <div class="flex items-center justify-between gap-4 mb-4">
                        <div class="flex-1 grid gap-4 sm:grid-cols-2">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Semestre</label>
                                <select formControlName="semester_number"
                                    class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="1">Semestre 1</option>
                                    <option value="2">Semestre 2</option>
                                    <option value="3">Semestre 3</option>
                                    <option value="4">Semestre 4</option>
                                    <option value="5">Semestre 5</option>
                                    <option value="6">Semestre 6</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Parcours du semestre</label>
                                <input type="text" formControlName="parcours"
                                    class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Parcours du semestre">
                            </div>
                        </div>
                        <button type="button" class="text-red-600 hover:text-red-800 text-sm font-semibold" (click)="removeSemesterByGroup(semesterGroup)">
                            Supprimer
                        </button>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Ressources du semestre</label>
                        <div class="max-h-48 overflow-y-auto border border-gray-200 rounded-lg p-3 bg-white">
                            @for (lesson of allLessons; track lesson.id) {
                                <button
                                    type="button"
                                    class="ml-1 mb-1 px-4 py-2 rounded-full border text-sm transition"
                                    [class.bg-blue-600]="isLessonSelected(lesson, semesterGroup)"
                                    [class.text-white]="isLessonSelected(lesson, semesterGroup)"
                                    (click)="toggleLesson(lesson, semesterGroup)">
                                    {{ lesson.title }}
                                </button>
                            }
                        </div>
                    </div>
                </div>
                }
            </div>

            <div class="pt-4 border-t border-gray-200">
                <div class="flex justify-between items-center text-sm text-gray-600 mb-2">
                    <span>Ressources totales sélectionnées</span>
                    <span>{{ totalSelectedLessons }}</span>
                </div>
                <button type="submit"
                    class="px-6 py-3 bg-blue-600 text-white rounded-lg mt-3 hover:bg-blue-700 transition font-medium shadow-sm">
                    {{ form.value.id ? 'Modifier la formation' : 'Créer la formation' }}
                </button>
            </div>
        </div>
    </form>
</div>
