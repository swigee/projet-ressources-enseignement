spring.application.name=project

# Configuration MySQL (Conforme au rapport)
spring.datasource.url=jdbc:mysql://localhost:3306/ressources_enseignements?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=


# IMPORTANT : Cela va recreer tes tables automatiquement a partir du code Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
#positionnement du niveau de log à DEBUG (INFO par défaut) pour tomcat et Spring JDBC
debug=true
logging.level.org.springframework.jdbc=DEBUG