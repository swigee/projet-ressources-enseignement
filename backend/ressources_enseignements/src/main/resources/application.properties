spring.application.name=project

# Configuration MySQL (Conforme au rapport)
spring.datasource.url=jdbc:mysql://mysql:3306/ressources_enseignements?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=sae
spring.datasource.password=sae


# IMPORTANT : Cela va recreer tes tables automatiquement a partir du code Java
# RECREATION DU SCHEMA (Clean Start)
spring.jpa.hibernate.ddl-auto=create
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#positionnement du niveau de log � DEBUG (INFO par d�faut) pour tomcat et Spring JDBC
debug=true
logging.level.org.springframework.jdbc=DEBUG