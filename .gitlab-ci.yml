stages:
  - build
  - test
  - sonarqube-check
  - deploy

# Build réel avec Maven
build-job:
  stage: build
  script:
    - mvn clean compile

# Job de test factice pour passer l'étape test
unit-test-job:
  stage: test
  script:
    - echo "No unit tests available. Skipping..."
  allow_failure: true   # ne bloque pas le pipeline

# Job de lint factice (optionnel)
lint-test-job:
  stage: test
  script:
    - echo "No lint checks configured. Skipping..."
  allow_failure: true

# Déploiement factice
deploy-job:
  stage: deploy
  environment: production
  script:
    - echo "Deploying application..."
    - echo "Application successfully deployed."

# Analyse SonarQube
sonarqube-check:
  stage: sonarqube-check
  image:
    name: sonarsource/sonar-scanner-cli:5.0
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
    SONAR_TOKEN: "${SONAR_TOKEN}"   # ton token SonarQube configuré dans GitLab
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner -Dsonar.login=$SONAR_TOKEN
  allow_failure: true
  only:
    - merge_requests
    - main
